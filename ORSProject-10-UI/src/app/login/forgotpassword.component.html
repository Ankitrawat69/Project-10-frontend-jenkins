<style>

    .bg-container {
  height: 100vh;
  background-image: url('assets/img/an.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
</style>


<div class="bg-container d-flex align-items-center justify-content-center">

  <div class="col-md-4">

    <div class="card shadow">

      <div class="card-body">

        <!-- Heading -->
        <h3 class="text-center text-primary">Forget Your Password?</h3>

        <p class="text-center text-info" style="font-size: 13px;">
          Submit your Email Address and we will send you password
        </p>

        <!-- Success -->
        <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
          {{ form.message }}
        </div>

        <!-- Error -->
        <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
          {{ form.message }}
        </div>

        <!-- Input -->
        <div class="form-group mt-3">
          <label><b>Email Id</b> <span class="text-danger">*</span></label>

          <div class="input-group">
            <div class="input-group-prepend">
              <span class="input-group-text">
                <i class="fa fa-envelope"></i>
              </span>
            </div>

            <input type="text"
                   class="form-control"
                   [(ngModel)]="form.data.loginId"
                   placeholder="Enter email">
          </div>

          <small class="text-danger">
            {{ form.inputerror.loginId }}
          </small>
        </div>

        <!-- Button -->
        <div class="text-center mt-4">
          <button class="btn btn-success px-4" (click)="submit()">Go</button>
        </div>

      </div>
    </div>

  </div>

</div>
