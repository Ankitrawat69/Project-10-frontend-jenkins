<div class="container-fluid" style="background-image: url('assets/img/college.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 75px;">

    <div class="row">
        <div class="col-md-4"></div>

        <div class="col-md-4">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary font-weight-bold" *ngIf="!form.data.id">
                        Add Report
                    </h3>

                    <h3 class="text-center text-primary font-weight-bold" *ngIf="form.data.id>0">
                        Update Report
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="form.error == false && form.message"
                        class="alert alert-success alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- REPORT ID -->
                    <label><b>Report Id *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-id-badge"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control" name="reportId"
                            [(ngModel)]="form.data.reportId" placeholder="Enter Report Id">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.reportId}}</span>
                    </div>

                    <!-- REPORT TYPE -->
                    <label><b>Report Type *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-book"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control" name="reportType"
                            [(ngModel)]="form.data.reportType" placeholder="Enter Report Type">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.reportType}}</span>
                    </div>

                    <!-- GENERATED DATE -->
                    <label><b>Generated Date *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-clock"></i>
                            </span>
                        </div>
                        <input type="date" class="form-control" name="generatedDate"
                            [(ngModel)]="form.data.generatedDate" placeholder="Enter Generated Date">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.generatedDate}}</span>
                    </div>

                    <!-- REMARKS -->
                    <label><b>Remarks *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-list"></i>
                            </span>
                        </div>
                        <textarea class="form-control" name="remarks" [(ngModel)]="form.data.remarks" rows="3"
                            placeholder="Enter Remarks">
                        </textarea>
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.remarks}}</span>
                    </div>

                    <!-- BUTTONS -->
                    <div class="text-center mt-4">

                        <button *ngIf="!form.data.id" (click)="submit()" class="btn btn-success mr-2">
                            Save
                        </button>

                        <button *ngIf="form.data.id" (click)="submit()" class="btn btn-success mr-2">
                            Update
                        </button>

                        <button *ngIf="!form.data.id" (click)="reset()" class="btn btn-warning mr-2">
                            Reset
                        </button>

                        <button *ngIf="form.data.id" (click)="forward('/reportlist')" class="btn btn-warning">
                            List
                        </button>

                    </div>

                </div>
            </div>

        </div>

        <div class="col-md-4"></div>
    </div>

</div>
