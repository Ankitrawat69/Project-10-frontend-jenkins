<div class="container-fluid" style="background-image: url('assets/img/list.png');
     background-size: cover;
     background-position: center;
     min-height: 100vh;
     padding: 50px;
     padding-bottom: 75px;">

    <!-- TITLE -->
    <h1 class="text-center text-dark font-weight-bold pt-3">
        <u>User List</u>
    </h1>

    <!-- SUCCESS -->
    <div class="row">
        <div class="col-md-4"></div>

        <div class="col-md-4 alert alert-success alert-dismissible text-center" *ngIf="!form.error && form.message"
            style="background-color:#80ff80;">
            <button type="button" class="close" data-dismiss="alert">&times;</button>
            {{form.message}}
        </div>

        <div class="col-md-4"></div>
    </div>

    <!-- ERROR -->
    <div class="row">
        <div class="col-md-4"></div>

        <div class="col-md-4 alert alert-danger alert-dismissible text-center" *ngIf="form.error && form.message">
            <button type="button" class="close" data-dismiss="alert">&times;</button>
            {{form.message}}
        </div>

        <div class="col-md-4"></div>
    </div>

    <!-- SEARCH SECTION -->
    <div class="row mt-3">

        <div class="col-sm-2"></div>

        <div class="col-sm-2">
            <input type="text" class="form-control" [(ngModel)]="form.searchParams.firstName"
                placeholder="Enter FirstName">
        </div>

        <div class="col-sm-2">
            <select class="form-control" [(ngModel)]="form.searchParams.roleId">
                <option [ngValue]="undefined">Select Role</option>
                <option *ngFor="let obj of form.preload.roleList" [ngValue]="obj.key">
                    {{obj.value}}
                </option>
            </select>
        </div>

        <div class="col-sm-2">
            <button (click)="search()" class="btn btn-primary btn-md w-100">
                Search
            </button>
        </div>

        <div class="col-sm-2">
            <button (click)="reset()" class="btn btn-dark btn-md w-100">
                Reset
            </button>
        </div>

        <div class="col-sm-2"></div>

    </div>

    <!-- TABLE -->
    <div class="table-responsive mt-4">

        <table class="table table-bordered table-dark table-hover text-center">

            <thead>
                <tr style="background-color: #8C8C8C;">

                    <th>
                        <input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)">
                        Select All
                    </th>

                    <th>#</th>
                    <th>Image</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Role</th>
                    <th>Phone</th>
                    <th>DOB</th>
                    <th>Edit</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let m of form.list; let i = index">

                    <td>
                        <input #checkboxes type="checkbox" (change)="checklistUpdate()" [id]="m.id" [value]="m.id">
                    </td>

                    <td>{{(form.pageNo*5)+i+1}}</td>

                    <!-- IMAGE -->
                    <td>
                        <img *ngIf="m.imageId" [src]="'http://localhost:8080/User/profilePic/' + m.id"
                            class="img-thumbnail" width="70">

                        <img *ngIf="!m.imageId" src="assets/files/default.jpg" class="img-thumbnail" width="70">
                    </td>

                    <td>{{m.firstName}}</td>
                    <td>{{m.lastName}}</td>
                    <td>{{m.loginId}}</td>
                    <td>{{m.status}}</td>
                    <td>{{m.roleName}}</td>
                    <td>{{m.phone}}</td>
                    <td>{{m.dob | date:'dd-MM-yyyy'}}</td>

                    <td>
                        <button class="btn btn-sm btn-primary" (click)="forward('/user/' + m.id)">
                            <i class="fa fa-edit"></i>
                        </button>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- ACTIONS -->
    <div class="row mt-3 align-items-center">

        <div class="col-md-4">
            <button class="btn btn-warning btn-md" (click)="previous()" [disabled]="form.pageNo == 0">
                Previous
            </button>
        </div>

        <div class="col-md-4 text-center">
            <button (click)="forward('/user')" class="btn btn-primary btn-md mr-2">
                new
            </button>

            <button (click)="deleteMany()" class="btn btn-danger btn-md">
                Delete
            </button>
        </div>

        <div class="col-md-4 text-right">
            <button class="btn btn-warning btn-md" (click)="next()" [disabled]="form.nextListSize == 0">
                Next
            </button>
        </div>

    </div>

</div>
