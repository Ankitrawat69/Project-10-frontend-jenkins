<div class="container-fluid"
     style="background-image: url('assets/img/teahu.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 75px;
     padding-bottom: 75px;">

    <div class="row">
        <div class="col-md-4"></div>

        <div class="col-md-4">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary font-weight-bold"
                        *ngIf="!form.data.id">
                        Add College
                    </h3>

                    <h3 class="text-center text-primary font-weight-bold"
                        *ngIf="form.data.id>0">
                        Update College
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="form.error == false && form.message"
                         class="alert alert-success alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message"
                         class="alert alert-danger alert-dismissible text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- NAME -->
                    <label><b>Name *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-university"></i>
                            </span>
                        </div>
                        <input type="text"
                               class="form-control"
                               name="name"
                               [(ngModel)]="form.data.name"
                               placeholder="Enter College Name">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.name}}</span>
                    </div>

                    <!-- ADDRESS -->
                    <label><b>Address *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-address-book"></i>
                            </span>
                        </div>
                        <input type="text"
                               class="form-control"
                               name="address"
                               [(ngModel)]="form.data.address"
                               placeholder="Enter Address">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.address}}</span>
                    </div>

                    <!-- STATE -->
                    <label><b>State *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-map"></i>
                            </span>
                        </div>
                        <input type="text"
                               class="form-control"
                               name="state"
                               [(ngModel)]="form.data.state"
                               placeholder="Enter State">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.state}}</span>
                    </div>

                    <!-- CITY -->
                    <label><b>City *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-building"></i>
                            </span>
                        </div>
                        <input type="text"
                               class="form-control"
                               name="city"
                               [(ngModel)]="form.data.city"
                               placeholder="Enter City">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.city}}</span>
                    </div>

                    <!-- PHONE -->
                    <label><b>Phone No *</b></label>
                    <div class="input-group mb-2">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fa fa-phone"></i>
                            </span>
                        </div>
                        <input type="text"
                               class="form-control"
                               name="phoneNo"
                               [(ngModel)]="form.data.phoneNo"
                               maxlength="10"
                               placeholder="Enter Phone No">
                    </div>
                    <div>
                        <span class="text-danger">{{form.inputerror.phoneNo}}</span>
                    </div>

                    <!-- BUTTONS -->
                    <div class="text-center mt-4">

                        <button *ngIf="!form.data.id"
                                (click)="submit()"
                                class="btn btn-success mr-2">
                            Save
                        </button>

                        <button *ngIf="form.data.id"
                                (click)="submit()"
                                class="btn btn-success mr-2">
                            Update
                        </button>

                        <button *ngIf="!form.data.id"
                                (click)="reset()"
                                class="btn btn-warning mr-2">
                            Reset
                        </button>

                        <button *ngIf="form.data.id"
                                (click)="forward('/collegelist')"
                                class="btn btn-warning">
                            List
                        </button>

                    </div>

                </div>
            </div>

        </div>

        <div class="col-md-4"></div>
    </div>

</div>
