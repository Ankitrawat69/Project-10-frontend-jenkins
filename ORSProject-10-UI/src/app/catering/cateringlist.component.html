    <div class="container-fluid" style="background-image: url('assets/img/list2.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 85px;">

    <!-- TITLE -->
    <h1 class="text-center text-dark font-weight-bold pt-3">
        Catering List
    </h1>

    <!-- SUCCESS -->
    <div class="row">
        <div class="col-md-4"></div>

        <div class="col-md-4 alert alert-success alert-dismissible text-center"
            *ngIf="form.error == false && form.message" style="background-color:#80ff80;">
            <button type="button" class="close" data-dismiss="alert">&times;</button>
            {{ form.message }}
        </div>

        <div class="col-md-4"></div>
    </div>

    <!-- ERROR -->
    <div class="row">
        <div class="col-md-4"></div>

        <div class="col-md-4 alert alert-danger alert-dismissible text-center" *ngIf="form.error && form.message">
            <button type="button" class="close" data-dismiss="alert">&times;</button>
            {{ form.message }}
        </div>

        <div class="col-md-4"></div>
    </div>

    <!-- SEARCH -->
    <div *ngIf="form.list.length > 0" class="row mt-3 justify-content-center align-items-center">

        <div class="col-md-3">
            <input type="text" class="form-control" name="cateringId" [(ngModel)]="form.searchParams.cateringId"
                placeholder="Enter Catering Id">
        </div>

        <div class="col-md-2">
            <button (click)="search()" class="btn btn-primary w-100">
                Search
            </button>
        </div>

        <div class="col-md-2">
            <button (click)="reset()" class="btn btn-dark w-100">
                Reset
            </button>
        </div>

    </div>

    <!-- TABLE -->
    <div *ngIf="form.list.length > 0" class="table-responsive mt-4">

        <table class="table table-bordered table-dark table-hover text-center">

            <thead>
                <tr style="background-color: #8C8C8C;">
                    <th>
                        <input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)">
                        Select All
                    </th>
                    <th>S.No</th>
                    <th>Catering Id</th>
                    <th>Vendor Name</th>
                    <th>Menu Type</th>
                    <th>Cost</th>
                    <th>Edit</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let m of form.list; let i = index">

                    <td>
                        <input type="checkbox" #checkboxes (change)="checklistUpdate()" [id]="m.id"
                            [value]="isMasterSel">
                    </td>

                    <td>{{(form.pageNo*5)+i+1}}</td>
                    <td>{{m.cateringId}}</td>
                    <td>{{m.vendorName}}</td>
                    <td>{{m.menuType}}</td>
                    <td>{{m.cost}}</td>

                    <td>
                        <button class="btn btn-sm btn-primary" (click)="forward('/catering/' + m.id)">
                            <i class="fa fa-edit"></i>
                        </button>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- ACTION BUTTONS -->
    <div *ngIf="form.list.length > 0" class="row mt-3 align-items-center">

        <div class="col-md-4">
            <button class="btn btn-secondary" (click)="previous()" [disabled]="form.pageNo == 0">
                Previous
            </button>
        </div>

        <div class="col-md-4 text-center">
            <button (click)="forward('/catering')" class="btn btn-primary mr-2">
                New
            </button>

            <button (click)="deleteMany()" class="btn btn-danger">
                Delete
            </button>
        </div>

        <div class="col-md-4 text-right">
            <button class="btn btn-secondary" (click)="next()" [disabled]="form.nextListSize == 0">
                Next
            </button>
        </div>

    </div>

    <!-- NO DATA -->
    <div *ngIf="form.list.length == 0" class="text-center mt-4">
        <button (click)="reset()" class="btn btn-primary">
            Back
        </button>
    </div>

</div>
